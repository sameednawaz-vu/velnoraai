<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Design explanatory tool images that rank</title>
  <desc id="desc">Editorial visual about building clear tool images with SEO metadata.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172554" />
      <stop offset="100%" stop-color="#9a3412" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="70" y="70" width="1060" height="490" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" />
  <text x="112" y="178" fill="#fff7ed" font-family="Georgia, Times New Roman, serif" font-size="52" font-weight="700">Design explanatory tool</text>
  <text x="112" y="240" fill="#fff7ed" font-family="Georgia, Times New Roman, serif" font-size="52" font-weight="700">images that rank</text>
  <text x="112" y="312" fill="#ffedd5" font-family="Trebuchet MS, Arial, sans-serif" font-size="29">Show input, transformation, and output in one clear visual system.</text>
  <rect x="112" y="358" width="300" height="182" rx="16" fill="#facc15" opacity="0.9" />
  <rect x="450" y="358" width="300" height="182" rx="16" fill="#38bdf8" opacity="0.9" />
  <rect x="788" y="358" width="300" height="182" rx="16" fill="#34d399" opacity="0.9" />
  <text x="262" y="448" text-anchor="middle" fill="#422006" font-family="Trebuchet MS, Arial, sans-serif" font-size="27" font-weight="700">Input</text>
  <text x="600" y="448" text-anchor="middle" fill="#052f4a" font-family="Trebuchet MS, Arial, sans-serif" font-size="27" font-weight="700">Transform</text>
  <text x="938" y="448" text-anchor="middle" fill="#05331f" font-family="Trebuchet MS, Arial, sans-serif" font-size="27" font-weight="700">Output</text>
</svg>

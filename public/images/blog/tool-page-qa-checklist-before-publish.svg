<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Tool page QA checklist before publish</title>
  <desc id="desc">Checklist board for metadata, links, UX, and runner verification.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="70" y="70" width="1060" height="490" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" />
  <text x="112" y="180" fill="#ecfeff" font-family="Georgia, Times New Roman, serif" font-size="54" font-weight="700">Tool page QA checklist</text>
  <text x="112" y="244" fill="#ecfeff" font-family="Georgia, Times New Roman, serif" font-size="54" font-weight="700">before publish</text>
  <text x="112" y="320" fill="#ccfbf1" font-family="Trebuchet MS, Arial, sans-serif" font-size="30">Validate metadata, links, responsive UI, and tool runner behavior.</text>
  <g fill="#f8fafc" font-family="Trebuchet MS, Arial, sans-serif" font-size="28">
    <text x="130" y="400">[x] Title, description, canonical</text>
    <text x="130" y="445">[x] Structured data is valid</text>
    <text x="130" y="490">[x] Route links and nav pass</text>
    <text x="130" y="535">[x] Runner tested on desktop/mobile</text>
  </g>
  <rect x="840" y="370" width="240" height="160" rx="18" fill="#22c55e" opacity="0.9" />
  <text x="960" y="445" text-anchor="middle" fill="#052e16" font-family="Trebuchet MS, Arial, sans-serif" font-size="33" font-weight="700">Ship</text>
</svg>

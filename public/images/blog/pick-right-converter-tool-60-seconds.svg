<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Pick the right converter tool quickly</title>
  <desc id="desc">Illustration showing fast source-to-target tool selection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="70" y="70" width="1060" height="490" rx="28" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" />
  <text x="110" y="180" fill="#f8fafc" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="700">Pick the right converter</text>
  <text x="110" y="248" fill="#f8fafc" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="700">tool in 60 seconds</text>
  <text x="110" y="336" fill="#dbeafe" font-family="Trebuchet MS, Arial, sans-serif" font-size="31">Source format, target format, quick pilot file, then full run.</text>
  <rect x="110" y="392" width="300" height="88" rx="18" fill="#0ea5e9" opacity="0.9" />
  <rect x="450" y="392" width="300" height="88" rx="18" fill="#22c55e" opacity="0.9" />
  <rect x="790" y="392" width="300" height="88" rx="18" fill="#f59e0b" opacity="0.9" />
  <text x="260" y="446" text-anchor="middle" fill="#06202c" font-family="Trebuchet MS, Arial, sans-serif" font-size="28" font-weight="700">Choose output</text>
  <text x="600" y="446" text-anchor="middle" fill="#052e16" font-family="Trebuchet MS, Arial, sans-serif" font-size="28" font-weight="700">Test one file</text>
  <text x="940" y="446" text-anchor="middle" fill="#451a03" font-family="Trebuchet MS, Arial, sans-serif" font-size="28" font-weight="700">Scale safely</text>
</svg>

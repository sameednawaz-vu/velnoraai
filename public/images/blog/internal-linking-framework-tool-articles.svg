<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Internal linking framework for tool articles</title>
  <desc id="desc">Network-style diagram linking category, tool, and article routes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="76" y="76" width="1048" height="478" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" />
  <text x="118" y="182" fill="#eef2ff" font-family="Georgia, Times New Roman, serif" font-size="52" font-weight="700">Internal linking framework</text>
  <text x="118" y="244" fill="#eef2ff" font-family="Georgia, Times New Roman, serif" font-size="52" font-weight="700">for tool articles</text>
  <text x="118" y="316" fill="#dbeafe" font-family="Trebuchet MS, Arial, sans-serif" font-size="29">Build route triangles to improve discovery and crawl depth.</text>
  <g stroke="#93c5fd" stroke-width="5" fill="none" opacity="0.8">
    <line x1="260" y1="430" x2="520" y2="430" />
    <line x1="520" y1="430" x2="390" y2="520" />
    <line x1="390" y1="520" x2="260" y2="430" />
  </g>
  <circle cx="260" cy="430" r="52" fill="#22d3ee" />
  <circle cx="520" cy="430" r="52" fill="#a78bfa" />
  <circle cx="390" cy="520" r="52" fill="#f59e0b" />
  <text x="260" y="438" text-anchor="middle" fill="#082f49" font-family="Trebuchet MS, Arial, sans-serif" font-size="20" font-weight="700">Category</text>
  <text x="520" y="438" text-anchor="middle" fill="#2e1065" font-family="Trebuchet MS, Arial, sans-serif" font-size="24" font-weight="700">Tool</text>
  <text x="390" y="528" text-anchor="middle" fill="#452103" font-family="Trebuchet MS, Arial, sans-serif" font-size="22" font-weight="700">Article</text>
  <text x="860" y="486" text-anchor="middle" fill="#e0e7ff" font-family="Trebuchet MS, Arial, sans-serif" font-size="30" font-weight="700">Intent-rich anchors</text>
</svg>
